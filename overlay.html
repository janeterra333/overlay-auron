<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Overlay Stream</title>
<style>
  body { margin: 0; background: transparent; overflow: hidden; }
  #imagen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  #texto { 
  position: absolute; 
  top: 65%; 
  left: 50%;
  transform: translateX(-50%);
  font-size: 50px; 
  color: white; 
  text-align: center;

  background: rgba(0, 0, 0, 0.6); /* fondo negro transparente */
  padding: 10px 20px;
  border-radius: 10px;
}
</style>
</head>
<body>
  <img id="imagen" src="imagen.png" alt="Overlay" width="400">
  <div id="texto">Tu texto aquí</div>
<script>
async function actualizar() {
  const res = await fetch("data.json?v=" + Date.now());
  const data = await res.json();

  document.getElementById("texto").innerText = data.texto;

  const img = document.getElementById("imagen");
  img.src = data.imagen + "?v=" + Date.now();
}

setInterval(actualizar, 3000);
actualizar();
</script>
</body>
</html>
